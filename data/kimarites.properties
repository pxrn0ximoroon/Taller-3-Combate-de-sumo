kimarite.1.nombre=Yorikiri
kimarite.1.descripcion=Empuje frontal sosteniendo el mawashi del rival

kimarite.2.nombre=Oshidashi
kimarite.2.descripcion=Empuje directo hacia afuera sin agarre del mawashi

kimarite.3.nombre=Hatakikomi
kimarite.3.descripcion=Jalar al oponente hacia abajo por los hombros

kimarite.4.nombre=Yoritaoshi
kimarite.4.descripcion=Derribar al rival empujando hacia adelante hasta caer

kimarite.5.nombre=Tsukidashi
kimarite.5.descripcion=Empujar al rival con golpes repetidos de palma abierta

kimarite.6.nombre=Okuridashi
kimarite.6.descripcion=Empujar al rival por la espalda fuera del ring

kimarite.7.nombre=Tsukiotoshi
kimarite.7.descripcion=Tirar al rival de lado con empujones laterales

kimarite.8.nombre=Oshitaoshi
kimarite.8.descripcion=Derribar al rival con empuje directo hacia el suelo

kimarite.9.nombre=Uwatenage
kimarite.9.descripcion=Lanzamiento por encima tomando el cinturón exterior del rival

kimarite.10.nombre=Shitatenage
kimarite.10.descripcion=Lanzamiento por debajo tomando el cinturón interior del rival

kimarite.11.nombre=Uwatedashinage
kimarite.11.descripcion=Arrastre y lanzamiento desde el exterior del cinturón

kimarite.12.nombre=Kotenage
kimarite.12.descripcion=Lanzamiento enrollando el brazo del oponente sobre el hombro

kimarite.13.nombre=Ipponzeoi
kimarite.13.descripcion=Lanzamiento cargando al rival completamente sobre la espalda

kimarite.14.nombre=Kubinage
kimarite.14.descripcion=Lanzamiento tomando el cuello del rival y girando

kimarite.15.nombre=Sukuinage
kimarite.15.descripcion=Lanzamiento de cuchara levantando al rival desde abajo
